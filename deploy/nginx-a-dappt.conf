# Install: sudo cp deploy/nginx-a-dappt.conf /etc/nginx/sites-available/a-dappt.com
# Enable:  sudo ln -sf /etc/nginx/sites-available/a-dappt.com /etc/nginx/sites-enabled/
# SSL:     sudo certbot --nginx -d a-dappt.com -d www.a-dappt.com
# Test:    sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    listen [::]:80;
    server_name a-dappt.com www.a-dappt.com;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
